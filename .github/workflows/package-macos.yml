name: Package QLaunch (macOS)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and Package
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Run Tests
        run: swift test

      - name: Package App
        run: ./scripts/package_macos_app.sh

      - name: Upload Packaged Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qlaunch-macos-${{ github.ref_name }}-${{ github.sha }}
          path: |
            dist/QLaunch.app.zip
            dist/QLaunch.app
          if-no-files-found: error
          retention-days: 14
